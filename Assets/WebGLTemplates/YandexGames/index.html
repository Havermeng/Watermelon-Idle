<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #unity-container {
            width: 100vw;
            height: 100vh;
        }
        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>

    <title>Watermelon Farmer - Yandex Games</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="icon" type="image/svg+xml" href="TemplateData/favicon.svg">
    <!-- Yandex Games SDK -->
    <script src="/sdk.js"></script>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
    </div>

    <script>
        function setupFullscreenButton() {
            const fullscreenBtn = document.getElementById('unity-fullscreen-button');
            if (fullscreenBtn) {
                fullscreenBtn.addEventListener('click', () => {
                    if (window.ysdk && window.ysdk.fullscreen) {
                        window.ysdk.fullscreen.enter();
                    } else if (window.unityInstance) {
                        window.unityInstance.SetFullscreen(1);
                    }
                });
            }
        }

        async function initSDK() {
            try {
                const ysdk = await YaGames.init();
                window.ysdk = ysdk;
                const lang = ysdk.environment.i18n.lang;
                window.yandexLang = lang;
                console.log("Yandex SDK initialized, lang:", lang);
            } catch (e) {
                console.warn("Yandex SDK init failed:", e);
            }
        }

        function startUnity() {
            var buildUrl = "Build";
            var loaderUrl = buildUrl + "/Game.loader.js";
            var config = {
                dataUrl: buildUrl + "/Game.data",
                frameworkUrl: buildUrl + "/Game.framework.js",
                codeUrl: buildUrl + "/Game.wasm",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "YourCompany",
                productName: "WatermelonFarmer",
                productVersion: "1.0.0",
                showBanner: function(msg, type) {
                    console.log(msg);
                },
            };
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                    document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
                }).then((unityInstance) => {
                    window.unityInstance = unityInstance;
                    setupFullscreenButton();
                }).catch((message) => {
                    alert(message);
                });
            };
            document.body.appendChild(script);
        }

        (async function() {
            if (typeof YaGames !== "undefined") {
                await initSDK();
            }
            startUnity();
        })();
        
    </script>
</body>
</html>
